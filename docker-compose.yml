x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - backend
    security_opt:
      - no-new-privileges:true
    pids_limit: 200
    logging: *default-logging

  redis:
    image: redis:8-alpine
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    command: ["sh", "-c", "exec redis-server --appendonly yes --requirepass \"$$REDIS_PASSWORD\""]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli --no-auth-warning -a \"$$REDIS_PASSWORD\" ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s
    networks:
      - backend
    security_opt:
      - no-new-privileges:true
    pids_limit: 100
    logging: *default-logging

  warp_proxy:
    image: caomingjun/warp:2026.4.1390.0-2.12.0
    restart: always
    entrypoint: ["/bin/bash", "/warp-supervisor.sh"]
    environment:
      WARP_SLEEP: "5"
      WARP_HEALTH_INTERVAL_SECONDS: "30"
      WARP_HEALTH_FAILURE_THRESHOLD: "3"
    expose:
      - "1080"
    volumes:
      - warp-data:/var/lib/cloudflare-warp
      - ./warp-supervisor.sh:/warp-supervisor.sh:ro
    cap_add:
      - NET_ADMIN
      - MKNOD
      - AUDIT_WRITE
    device_cgroup_rules:
      - "c 10:200 rwm"
    sysctls:
      net.ipv6.conf.all.disable_ipv6: "0"
      net.ipv4.conf.all.src_valid_mark: "1"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS --max-time 15 --socks5-hostname 127.0.0.1:1080 https://www.cloudflare.com/cdn-cgi/trace | grep -Eq 'warp=(on|plus)'",
        ]
      interval: 30s
      timeout: 20s
      retries: 10
      start_period: 90s
    networks:
      - outbound
    pids_limit: 200
    logging: *default-logging

  bot-app:
    image: farstar-warner:latest
    init: true
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ${BOT_ENV_FILE:-.env}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      warp_proxy:
        condition: service_started
    environment:
      INSTAGRAM_PROXY_URL: ${INSTAGRAM_PROXY_URL:-socks5://warp_proxy:1080}
    networks:
      - backend
      - outbound
    read_only: true
    tmpfs:
      - /tmp:size=256m,mode=1777
    shm_size: 256m
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    stop_grace_period: 30s
    pids_limit: 256
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "test -s /tmp/farstar-ready && kill -0 1"]
      interval: 5s
      timeout: 3s
      retries: 24
      start_period: 30s

volumes:
  postgres-data:
  redis-data:
  warp-data:

networks:
  backend:
    internal: true
  outbound:
