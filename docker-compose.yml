version: '3.8'

services:
  postgres_db:
    image: postgres:15-alpine
    container_name: farstar_postgres
    restart: always
    environment:
      POSTGRES_USER: farstar_admin
      POSTGRES_PASSWORD: secret_password_123
      POSTGRES_DB: farstar_warner_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  bot-app:
    build: .
    container_name: farstar_bot_app
    restart: always
    depends_on:
      - postgres_db
    environment:
      - BOT_TOKEN=YOUR_TELEGRAM_BOT_TOKEN_HERE
      - ADMIN_ID=YOUR_TELEGRAM_ID_HERE
      - DATABASE_URL=postgresql+asyncpg://farstar_admin:secret_password_123@postgres_db:5432/farstar_warner_db
    volumes:
      - .:/app

volumes:
  pgdata:
